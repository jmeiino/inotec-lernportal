services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lernportal
      POSTGRES_PASSWORD: lernportal
      POSTGRES_DB: lernportal
    ports:
      - "5408:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lernportal"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3113:3000"
    environment:
      DATABASE_URL: postgresql://lernportal:lernportal@db:5432/lernportal
      NEXTAUTH_URL: http://localhost:3113
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - materials_data:/app/data/materials
      - certificates_data:/app/data/certificates

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3114:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  postgres_data:
  materials_data:
  certificates_data:
